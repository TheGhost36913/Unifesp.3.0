<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conferência Multi-Usuário</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <video autoplay muted loop playsinline id="background-video">
        <source src="https://videos.pexels.com/video-files/3191572/3191572-uhd_2560_1440_25fps.mp4" type="video/mp4">
    </video>

    <div class="main-container">
        <h1>Plataforma de Reunião Corporativa</h1>

        <div class="user-setup-section">
            <input type="text" id="usernameInput" placeholder="Seu Nome de Usuário" maxlength="15">
            <input type="text" id="roomInput" placeholder="ID ou Nome da Sala" maxlength="20">
            <button id="joinRoomButton" class="action-button primary">Entrar na Sala</button>
            <p class="status-message" id="setupStatus"></p>
        </div>

        <div class="live-section hidden">
            <div class="video-streams">
                <div class="video-wrapper local-stream">
                    <h2 class="video-title"><span id="localUsername"></span> (Você)</h2>
                    <video id="localVideo" autoplay muted playsinline></video>
                    <div class="controls">
                        <button id="toggleAudio" class="control-button">Mic ON</button>
                        <button id="toggleVideo" class="control-button">Cam ON</button>
                    </div>
                </div>
                
                <div id="remoteVideosContainer" class="remote-grid-container"></div>
            </div>

            <div class="text-chat">
                <h3>Chat da Sala</h3>
                <div id="messages"></div>
                <div class="message-input-area">
                    <input type="text" id="messageInput" placeholder="Escreva uma mensagem...">
                    <button id="sendMessage" class="action-button small">Enviar</button>
                </div>
            </div>

            <div class="call-actions">
                <button id="leaveCallButton" class="action-button danger">Desconectar da Reunião</button>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="client.js"></script>
</body>
</html>
